{% extends "layout.html" %}

{% block main %}

<h1 class="mb-4">Register</h1>

<form action="/register" method="post">

    <div class="mb-3">
        <input
            class="form-control"
            name="username"
            placeholder="Username"
        >
    </div>

    <div class="mb-3">
        <input
            class="form-control"
            name="password"
            placeholder="Password"
            type="password"
        >
    </div>

    <button class="btn btn-primary" type="submit">
        Register
    </button>

</form>

{% endblock %}
