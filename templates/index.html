{% extends "layout.html" %}

{% block main %}

<h1 class="mb-4">Job Application Tracker</h1>

<a href="/add" class="btn btn-primary mb-4">
    Add Job
</a>

<table class="table table-bordered table-hover">

    <thead>
        <tr>
            <th>Company</th>
            <th>Position</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>

        {% for job in jobs %}

        <tr>
            <td>{{ job[1] }}</td>
            <td>{{ job[2] }}</td>
            <td>{{ job[3] }}</td>

                <td class="d-flex gap-2">

                    <a href="/edit/{{ job[0] }}" class="btn btn-warning btn-sm">
                        Edit
                    </a>
                <form action="/delete/{{ job[0] }}" method="post">
                    <button class="btn btn-danger btn-sm" type="submit">
                        Delete
                    </button>
                </form>
            </td>
        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
