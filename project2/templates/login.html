{% extends "layout.html" %}

{% block main %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <h1 class="mb-4">Login</h1>

        <form method="POST">

            <div class="mb-3">
                <input
                    class="form-control"
                    name="username"
                    placeholder="Username"
                    required
                >
            </div>

            <div class="mb-3">
                <input
                    class="form-control"
                    name="password"
                    type="password"
                    placeholder="Password"
                    required
                >
            </div>

            <button class="btn btn-primary" type="submit">
                Login
            </button>

        </form>

        <p class="mt-3">
            Don't have an account?
            <a href="/register">Register</a>
        </p>

    </div>
</div>

{% endblock %}
